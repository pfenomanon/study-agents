x-zima-16gb-service-defaults: &zima-16gb-service-defaults
  restart: unless-stopped

services:
  cag-service:
    <<: *zima-16gb-service-defaults
    cpus: "3.0"
    mem_limit: 5g
    mem_reservation: 2g

  rag-service:
    <<: *zima-16gb-service-defaults
    cpus: "2.0"
    mem_limit: 3g
    mem_reservation: 1g

  copilot-service:
    <<: *zima-16gb-service-defaults
    cpus: "2.0"
    mem_limit: 3g
    mem_reservation: 1g

  copilot-frontend:
    <<: *zima-16gb-service-defaults
    cpus: "1.0"
    mem_limit: 1g
    mem_reservation: 256m

  redis:
    <<: *zima-16gb-service-defaults
    cpus: "0.50"
    mem_limit: 256m
    mem_reservation: 64m

  authelia:
    <<: *zima-16gb-service-defaults
    cpus: "0.75"
    mem_limit: 512m
    mem_reservation: 128m

  tls-gateway:
    <<: *zima-16gb-service-defaults
    cpus: "0.50"
    mem_limit: 512m
    mem_reservation: 128m

  utility-service:
    <<: *zima-16gb-service-defaults
    profiles: ["tools"]
    cpus: "1.0"
    mem_limit: 1g
    mem_reservation: 256m

  vault:
    <<: *zima-16gb-service-defaults
    profiles: ["vault"]
    cpus: "0.50"
    mem_limit: 512m
    mem_reservation: 128m
