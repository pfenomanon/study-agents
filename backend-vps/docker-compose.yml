x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cag-service:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      args:
        INSTALL_EXTRAS: server
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /app
      TLS_CERT_FILE: /tls/cag-service.crt
      TLS_KEY_FILE: /tls/cag-service.key
      SSL_CERT_FILE: /tls/ca-bundle.crt
      VAULT_ADDR: ${VAULT_ADDR_INTERNAL:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT_INTERNAL:-/tls/vault-ca.pem}
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh python -m study_agents.api_server"]
    logging: *default-logging
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./knowledge_graph:/app/knowledge_graph
      - ./scripts/use_env.sh:/app/use_env.sh:ro
      - ./docker/internal-tls:/tls:ro
      - env-vol:/env

  rag-service:
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      TLS_CERT_FILE: /tls/rag-service.crt
      TLS_KEY_FILE: /tls/rag-service.key
      SSL_CERT_FILE: /tls/ca-bundle.crt
      VAULT_ADDR: ${VAULT_ADDR_INTERNAL:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT_INTERNAL:-/tls/vault-ca.pem}
    depends_on:
      - cag-service
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./scripts/use_env.sh:/app/use_env.sh:ro
      - ./docker/internal-tls:/tls:ro
      - env-vol:/env
    ports:
      - "127.0.0.1:8100:8100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh python -m study_agents.rag_service"]
    logging: *default-logging

  utility-service:
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      SSL_CERT_FILE: /tls/ca-bundle.crt
      VAULT_ADDR: ${VAULT_ADDR_INTERNAL:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT_INTERNAL:-/tls/vault-ca.pem}
    depends_on:
      - cag-service
    volumes:
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./research_output:/app/research_output
      - ./scripts/use_env.sh:/app/use_env.sh:ro
      - ./docker/internal-tls:/tls:ro
      - env-vol:/env
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh tail -f /dev/null"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  copilot-service:
    image: study-agents-python:latest
    user: "0:0"
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      COPILOT_RESEARCH_OUTPUT_DIR: /app/data/output/research
      TLS_CERT_FILE: /tls/copilot-service.crt
      TLS_KEY_FILE: /tls/copilot-service.key
      SSL_CERT_FILE: /tls/ca-bundle.crt
      VAULT_ADDR: ${VAULT_ADDR_INTERNAL:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT_INTERNAL:-/tls/vault-ca.pem}
    depends_on:
      - cag-service
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./research_output:/app/research_output
      - ./data:/app/data
      - ./scripts/use_env.sh:/app/use_env.sh:ro
      - ./docker/internal-tls:/tls:ro
      - env-vol:/env
    ports:
      - "127.0.0.1:9010:9010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh python -m study_agents.copilot_service"]
    restart: unless-stopped
    logging: *default-logging

  copilot-frontend:
    build:
      context: ./copilot-frontend
      dockerfile: ../docker/copilot-frontend.Dockerfile
    image: study-agents-copilot-frontend
    user: "0:0"
    env_file: .env
    environment:
      NEXT_PUBLIC_COPILOT_API: /api/copilot
      COPILOT_BACKEND_URL: https://copilot-service:9010/copilot/chat
      COPILOT_API_KEY: ${COPILOT_API_KEY:-}
      RESEARCH_ROOT: /app/data/output/research
      NODE_EXTRA_CA_CERTS: /tls/internal-ca.crt
    depends_on:
      - copilot-service
    volumes:
      - ./data:/app/data
      - ./research_output:/app/research_output
      - ./docker/internal-tls:/tls:ro
    ports:
      - "127.0.0.1:3000:3443"
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1"
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /tls/redis.crt
      - --tls-key-file
      - /tls/redis.key
      - --tls-ca-cert-file
      - /tls/internal-ca.crt
      - --tls-auth-clients
      - "no"
    volumes:
      - ./docker/internal-tls:/tls:ro
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  authelia:
    image: authelia/authelia:latest
    depends_on:
      - redis
    volumes:
      - ./docker/authelia:/config
      - ./docker/internal-tls:/tls:ro
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  tls-gateway:
    image: caddy:2.8-alpine
    env_file: .env
    depends_on:
      - cag-service
      - rag-service
      - copilot-service
      - copilot-frontend
      - authelia
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docker/internal-tls:/tls:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  vault:
    image: hashicorp/vault:1.16.2
    entrypoint: ["vault"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-root}
      VAULT_ADDR: https://0.0.0.0:8200
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - ./docker/internal-tls:/tls
    networks:
      - backend
    cap_add:
      - IPC_LOCK
    command:
      - server
      - -dev
      - -dev-listen-address=0.0.0.0:8200
      - -dev-root-token-id=${VAULT_DEV_ROOT_TOKEN_ID:-root}
      - -dev-tls
      - -dev-tls-cert-dir=/tls
      - -dev-tls-san=vault
    logging: *default-logging

volumes:
  env-vol:
  caddy-data:
  caddy-config:

networks:
  backend:
    driver: bridge
