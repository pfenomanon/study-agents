x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  cag-service:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
      args:
        INSTALL_EXTRAS: server
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /app
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-approle}
      VAULT_ADDR: ${VAULT_ADDR:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT:-/vault/tls/vault-ca.pem}
      VAULT_ROLE_ID_FILE: ${VAULT_ROLE_ID_FILE:-/vault/bootstrap/role_id}
      VAULT_SECRET_ID_FILE: ${VAULT_SECRET_ID_FILE:-/vault/bootstrap/secret_id}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh python -m study_agents.api_server"]
    logging: *default-logging
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./knowledge_graph:/app/knowledge_graph
      - env-vol:/env
      - ./docker/vault/runtime:/vault/bootstrap:ro
      - ./docker/vault/trust:/vault/tls:ro

  rag-service:
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-approle}
      VAULT_ADDR: ${VAULT_ADDR:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT:-/vault/tls/vault-ca.pem}
      VAULT_ROLE_ID_FILE: ${VAULT_ROLE_ID_FILE:-/vault/bootstrap/role_id}
      VAULT_SECRET_ID_FILE: ${VAULT_SECRET_ID_FILE:-/vault/bootstrap/secret_id}
    depends_on:
      - cag-service
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./data:/app/data
      - env-vol:/env
      - ./docker/vault/runtime:/vault/bootstrap:ro
      - ./docker/vault/trust:/vault/tls:ro
    ports:
      - "127.0.0.1:8100:8100"
    networks:
      - backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh python -m study_agents.rag_service"]
    logging: *default-logging

  utility-service:
    image: study-agents-python:latest
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-approle}
      VAULT_ADDR: ${VAULT_ADDR:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT:-/vault/tls/vault-ca.pem}
      VAULT_ROLE_ID_FILE: ${VAULT_ROLE_ID_FILE:-/vault/bootstrap/role_id}
      VAULT_SECRET_ID_FILE: ${VAULT_SECRET_ID_FILE:-/vault/bootstrap/secret_id}
    depends_on:
      - cag-service
    volumes:
      - ./prompts:/app/prompts
      - ./data:/app/data
      - ./research_output:/app/research_output
      - env-vol:/env
      - ./docker/vault/runtime:/vault/bootstrap:ro
      - ./docker/vault/trust:/vault/tls:ro
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh tail -f /dev/null"]
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  copilot-service:
    image: study-agents-python:latest
    user: "0:0"
    env_file: .env
    environment:
      HOME: /tmp
      XDG_CACHE_HOME: /tmp/.cache
      COPILOT_RESEARCH_OUTPUT_DIR: /app/data/output/research
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-approle}
      VAULT_ADDR: ${VAULT_ADDR:-https://vault:8200}
      VAULT_CACERT: ${VAULT_CACERT:-/vault/tls/vault-ca.pem}
      VAULT_ROLE_ID_FILE: ${VAULT_ROLE_ID_FILE:-/vault/bootstrap/role_id}
      VAULT_SECRET_ID_FILE: ${VAULT_SECRET_ID_FILE:-/vault/bootstrap/secret_id}
    depends_on:
      - cag-service
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./research_output:/app/research_output
      - ./data:/app/data
      - env-vol:/env
      - ./docker/vault/runtime:/vault/bootstrap:ro
      - ./docker/vault/trust:/vault/tls:ro
    ports:
      - "127.0.0.1:9010:9010"
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c", "/app/use_env.sh uvicorn study_agents.copilot_service:app --host 0.0.0.0 --port 9010 --workers ${COPILOT_SERVICE_WORKERS:-2}"]
    restart: unless-stopped
    logging: *default-logging

  copilot-frontend:
    build:
      context: ./copilot-frontend
      dockerfile: ../docker/copilot-frontend.Dockerfile
    image: study-agents-copilot-frontend
    user: "0:0"
    env_file: .env
    environment:
      NEXT_PUBLIC_COPILOT_API: /api/copilot
      COPILOT_BACKEND_URL: http://copilot-service:9010/copilot/chat
      COPILOT_API_KEY: ${COPILOT_API_KEY:-}
      RESEARCH_ROOT: /app/data/output/research
    depends_on:
      - copilot-service
    volumes:
      - ./data:/app/data
      - ./research_output:/app/research_output
      - env-vol:/env:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  authelia:
    image: authelia/authelia:latest
    depends_on:
      - redis
    volumes:
      - ./docker/authelia:/config
      - ./docker/internal-tls:/tls:ro
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  tls-gateway:
    image: caddy:2.8-alpine
    env_file: .env
    depends_on:
      - cag-service
      - rag-service
      - copilot-service
      - copilot-frontend
      - authelia
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - backend
    restart: unless-stopped
    logging: *default-logging

  vault:
    image: hashicorp/vault:1.16.2
    user: "0:0"
    entrypoint: ["vault"]
    environment:
      VAULT_ADDR: https://127.0.0.1:8200
    ports:
      - "127.0.0.1:8200:8200"
      - "127.0.0.1:8201:8201"
    networks:
      - backend
    cap_add:
      - IPC_LOCK
    command: ["server", "-config=/vault/config/vault.hcl"]
    volumes:
      - ./docker/vault/config:/vault/config:ro
      - ./docker/vault/policies:/vault/policies:ro
      - ./docker/vault/bootstrap:/vault/bootstrap
      - ./docker/vault/runtime:/vault/runtime
      - ./docker/vault/data:/vault/data
      - ./docker/internal-tls:/tls:ro
    restart: unless-stopped
    logging: *default-logging

volumes:
  env-vol:
  caddy-data:
  caddy-config:

networks:
  backend:
    driver: bridge
